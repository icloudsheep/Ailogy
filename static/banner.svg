<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ailogy：ai-log 客户端上报、纯后端存储、瀑布流查看">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6f8ff"/><stop offset="1" stop-color="#e8edfb"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.12" cy="0.1" r="0.8"><stop offset="0" stop-color="#8ec5ff" stop-opacity=".4"/><stop offset="1" stop-color="#8ec5ff" stop-opacity="0"/></radialGradient>
    <radialGradient id="g2" cx="0.9" cy="1" r="0.8"><stop offset="0" stop-color="#c5a3ff" stop-opacity=".38"/><stop offset="1" stop-color="#c5a3ff" stop-opacity="0"/></radialGradient>
    <linearGradient id="cli" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#39425e"/><stop offset="1" stop-color="#2a3149"/></linearGradient>
    <linearGradient id="be" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8ec5ff"/><stop offset="1" stop-color="#6ea8fe"/></linearGradient>
    <linearGradient id="db" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9d7bff"/><stop offset="1" stop-color="#7b5be0"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2a3458" flood-opacity=".25"/></filter>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#g1)"/><rect width="1200" height="360" fill="url(#g2)"/>

  <!-- 流向箭头底线 -->
  <g stroke="#9aa7c8" stroke-width="3" stroke-linecap="round" fill="none" opacity=".7">
    <path d="M330 180 H400"/><path d="M388 170 l16 10 l-16 10"/>
    <path d="M700 180 H770"/><path d="M758 170 l16 10 l-16 10"/>
  </g>

  <!-- ① ai-log 客户端终端 -->
  <g filter="url(#sh)" transform="translate(70 95)">
    <rect width="260" height="170" rx="16" fill="url(#cli)"/>
    <circle cx="24" cy="26" r="6" fill="#ff6b6b"/><circle cx="44" cy="26" r="6" fill="#ffd17a"/><circle cx="64" cy="26" r="6" fill="#7ee787"/>
    <text x="22" y="64" font-family="ui-monospace,Menlo,monospace" font-size="13" fill="#9ee6c4">$ ailog --report</text>
    <rect x="22" y="80" width="180" height="9" rx="4.5" fill="#6ea8fe" opacity=".8"/>
    <rect x="22" y="98" width="140" height="9" rx="4.5" fill="#8ea0c8" opacity=".7"/>
    <rect x="22" y="116" width="200" height="9" rx="4.5" fill="#8ea0c8" opacity=".5"/>
    <text x="22" y="150" font-family="ui-monospace,Menlo,monospace" font-size="11.5" fill="#7ee787">✓ 本地渲染 · 已上报</text>
  </g>
  <text x="200" y="290" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" font-weight="650" fill="#5a6884">① ai-log 客户端</text>
  <text x="200" y="310" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="12" fill="#8090ad">本地离线 +（可选）--report 上报</text>

  <!-- ② 纯后端 + DB -->
  <g filter="url(#sh)" transform="translate(430 110)">
    <rect width="240" height="140" rx="16" fill="#ffffff" opacity=".78"/>
    <rect width="240" height="140" rx="16" fill="#6ea8fe" opacity=".08"/>
    <text x="120" y="38" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="15" font-weight="700" fill="#2a3149">FastAPI 纯后端</text>
    <text x="120" y="60" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="11.5" fill="#5a6884">零鉴权 · 只收不产</text>
    <g transform="translate(30 78)">
      <rect width="80" height="26" rx="8" fill="#6ea8fe" opacity=".8"/><text x="40" y="18" text-anchor="middle" font-size="11" fill="#fff">ingest</text>
      <rect x="100" y="0" width="80" height="26" rx="8" fill="#46d1c4" opacity=".8"/><text x="140" y="18" text-anchor="middle" font-size="11" fill="#0f4a38">search</text>
    </g>
  </g>
  <g filter="url(#sh)" transform="translate(488 256)">
    <rect width="124" height="48" rx="12" fill="url(#db)"/>
    <text x="62" y="30" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="13" font-weight="650" fill="#fff">🗄 SQLite</text>
  </g>
  <path d="M550 250 V256" stroke="#9d7bff" stroke-width="3" opacity=".6"/>
  <text x="550" y="330" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" font-weight="650" fill="#5a6884">② 多设备汇聚存储</text>

  <!-- ③ 瀑布流 -->
  <g filter="url(#sh)" transform="translate(800 70)">
    <rect width="330" height="220" rx="16" fill="#ffffff" opacity=".8"/>
    <rect width="330" height="220" rx="16" fill="#9d7bff" opacity=".06"/>
    <!-- 三张卡片堆叠 -->
    <g transform="translate(20 18)">
      <rect width="290" height="56" rx="11" fill="#fff" opacity=".9" stroke="#8ec5ff" stroke-width="2"/>
      <rect x="14" y="12" width="120" height="9" rx="4.5" fill="#2a3149"/><rect x="14" y="30" width="200" height="8" rx="4" fill="#8ea0c8"/>
    </g>
    <g transform="translate(20 84)">
      <rect width="290" height="56" rx="11" fill="#fff" opacity=".9" stroke="#9ee6c4" stroke-width="2"/>
      <rect x="14" y="12" width="150" height="9" rx="4.5" fill="#2a3149"/><rect x="14" y="30" width="180" height="8" rx="4" fill="#8ea0c8"/>
    </g>
    <g transform="translate(20 150)">
      <rect width="290" height="50" rx="11" fill="#fff" opacity=".75" stroke="#c5a3ff" stroke-width="2"/>
      <rect x="14" y="12" width="110" height="9" rx="4.5" fill="#2a3149"/><rect x="14" y="28" width="160" height="8" rx="4" fill="#8ea0c8"/>
    </g>
  </g>
  <text x="965" y="320" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" font-weight="650" fill="#5a6884">③ 泳道瀑布流查看</text>
</svg>
