<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="运行流程：ai-log 记录 → 本地离线 HTML（始终）；配了云端地址则 --report 上报 → Ailogy 后端 → SQLite → 瀑布流">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#f6f8ff"/><stop offset="1" stop-color="#eaeffb"/></linearGradient>
    <linearGradient id="cA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#39425e"/><stop offset="1" stop-color="#2a3149"/></linearGradient>
    <linearGradient id="cB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9ee6c4"/><stop offset="1" stop-color="#46d1c4"/></linearGradient>
    <linearGradient id="cC" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8ec5ff"/><stop offset="1" stop-color="#6ea8fe"/></linearGradient>
    <linearGradient id="cD" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#c5a3ff"/><stop offset="1" stop-color="#9d7bff"/></linearGradient>
    <filter id="fs" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#2a3458" flood-opacity=".2"/></filter>
  </defs>
  <rect width="1200" height="320" fill="url(#fbg)"/>

  <text x="600" y="40" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="17" font-weight="700" fill="#2a3149">运行流程：本地始终可用，云端按需叠加</text>

  <!-- 分区标签 -->
  <rect x="30" y="88" width="450" height="196" rx="18" fill="#6ea8fe" opacity=".05" stroke="#8ec5ff" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="255" y="110" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="13" font-weight="700" fill="#5a6884">ai-log 客户端（自包含）</text>

  <rect x="720" y="88" width="450" height="196" rx="18" fill="#9d7bff" opacity=".05" stroke="#c5a3ff" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="945" y="110" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="13" font-weight="700" fill="#5a6884">Ailogy 后端（可选）</text>

  <!-- ① 记录 -->
  <g filter="url(#fs)" transform="translate(56 130)">
    <rect width="180" height="64" rx="14" fill="url(#cA)"/>
    <text x="90" y="30" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" font-weight="700" fill="#fff">① 记录日志</text>
    <text x="90" y="50" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#9ee6c4">总结上次到现在</text>
  </g>

  <!-- ② 本地落盘 -->
  <g filter="url(#fs)" transform="translate(284 130)">
    <rect width="180" height="64" rx="14" fill="url(#cB)"/>
    <text x="90" y="30" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" font-weight="700" fill="#0f4a38">② 本地离线 HTML</text>
    <text x="90" y="50" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="11" fill="#0f4a38">data.json + 双击即看</text>
  </g>
  <text x="374" y="232" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="12" font-weight="650" fill="#2a9d6e">始终发生 · 无需任何服务</text>

  <!-- ① → ② -->
  <g stroke="#9aa7c8" stroke-width="3" stroke-linecap="round" fill="none" opacity=".75">
    <path d="M236 162 H284"/><path d="M272 152 l14 10 l-14 10"/>
  </g>

  <!-- ② → 判定（跨区）配了 report_url？ -->
  <g stroke="#9d7bff" stroke-width="3" stroke-linecap="round" fill="none" opacity=".7" stroke-dasharray="2 6">
    <path d="M464 162 H548"/><path d="M536 152 l14 10 l-14 10"/>
  </g>
  <text x="600" y="150" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="11.5" font-weight="700" fill="#7b5be0">配了 report_url</text>
  <text x="600" y="167" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="11.5" font-weight="700" fill="#7b5be0">且带 --report</text>
  <text x="600" y="188" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="10.5" fill="#9a8fbf">否则止于本地</text>

  <g stroke="#9d7bff" stroke-width="3" stroke-linecap="round" fill="none" opacity=".7" stroke-dasharray="2 6">
    <path d="M652 162 H736"/><path d="M724 152 l14 10 l-14 10"/>
  </g>

  <!-- ③ 后端 ingest -->
  <g filter="url(#fs)" transform="translate(744 130)">
    <rect width="176" height="64" rx="14" fill="url(#cC)"/>
    <text x="88" y="30" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" font-weight="700" fill="#fff">③ 后端 ingest</text>
    <text x="88" y="50" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="10.5" fill="#eaf3ff">POST /api/ingest/entries</text>
  </g>

  <!-- ④ SQLite -->
  <g filter="url(#fs)" transform="translate(968 130)">
    <rect width="176" height="64" rx="14" fill="url(#cD)"/>
    <text x="88" y="30" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" font-weight="700" fill="#fff">④ SQLite 入库</text>
    <text x="88" y="50" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="11" fill="#f1ebff">按 day#seq 幂等</text>
  </g>

  <!-- ③ → ④ -->
  <g stroke="#9aa7c8" stroke-width="3" stroke-linecap="round" fill="none" opacity=".75">
    <path d="M920 162 H968"/><path d="M956 152 l14 10 l-14 10"/>
  </g>

  <!-- ⑤ 瀑布流（后端下方） -->
  <g filter="url(#fs)" transform="translate(856 224)">
    <rect width="200" height="52" rx="13" fill="#fff" stroke="#9d7bff" stroke-width="2"/>
    <text x="100" y="24" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="13.5" font-weight="700" fill="#2a3149">⑤ 泳道瀑布流</text>
    <text x="100" y="42" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="10.5" fill="#5a6884">多设备汇聚 · 搜索 · 编辑</text>
  </g>
  <g stroke="#9d7bff" stroke-width="3" stroke-linecap="round" fill="none" opacity=".55">
    <path d="M1056 194 V224"/><path d="M1046 212 l10 14 l10 -14"/>
  </g>
</svg>
