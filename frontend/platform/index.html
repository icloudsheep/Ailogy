<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailogy · 密钥平台</title>
<script>
  try {
    document.documentElement.setAttribute("data-style", localStorage.getItem("ailogy:style") || "glass");
    document.documentElement.setAttribute("data-mode", localStorage.getItem("ailogy:mode") || "light");
  } catch (e) {}
</script>
<link rel="stylesheet" href="/static/frontend/shared/css/theme.css">
<link rel="stylesheet" href="/platform-assets/css/platform.css">
</head>
<body>
<div class="bg"></div>
<header class="topbar"><h1>🔑 Ailogy 密钥平台</h1><span id="who" class="who"></span></header>

<main class="wrap">
  <!-- 未登录：注册/登录 -->
  <section id="auth" class="box" hidden>
    <div class="tabs">
      <button class="tab on" data-pane="login">登录</button>
      <button class="tab" data-pane="register">注册</button>
    </div>
    <div id="msg" class="msg"></div>
    <form id="form">
      <input id="email" type="email" placeholder="邮箱" autocomplete="email" required />
      <input id="password" type="password" placeholder="密码（≥8 位）" autocomplete="current-password" required />
      <input id="handle" type="text" placeholder="用户名 handle（注册可选，用于页面地址 /u/xxx）" hidden />
      <button id="submit" type="submit">登录</button>
    </form>
  </section>

  <!-- 已登录：密钥 + 申请 -->
  <section id="dash" hidden>
    <div class="box">
      <div class="bt">我的密钥 <button id="newkey" class="mini">+ 新建密钥</button></div>
      <p class="hint">密钥明文随时可复制（个人自托管）；删除不可逆。</p>
      <div id="keys"></div>
    </div>
    <div class="box">
      <div class="bt">申请 API 密钥（可选，走管理员审批）</div>
      <div id="app-state" class="msg"></div>
      <form id="apply-form">
        <textarea id="reason" placeholder="申请理由（可选）"></textarea>
        <button type="submit">提交申请</button>
      </form>
    </div>
    <div class="box" id="admin-card" hidden>
      <div class="bt">🛡 待审批申请</div>
      <div id="admin-apps"></div>
    </div>
    <button id="logout" class="mini">退出登录</button>
  </section>
</main>

<script src="/static/frontend/shared/js/utils.js"></script>
<script src="/static/frontend/shared/js/ui.js"></script>
<script src="/static/frontend/shared/js/page-nav.js"></script>
<script src="/platform-assets/js/platform.js"></script>
</body>
</html>
