<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailogy · 密钥</title>
<script>
  try {
    document.documentElement.setAttribute("data-style", localStorage.getItem("ailogy:style") || "glass");
    document.documentElement.setAttribute("data-mode", localStorage.getItem("ailogy:mode") || "light");
  } catch (e) {}
</script>
<link rel="stylesheet" href="/static/frontend/shared/css/theme.css">
<link rel="stylesheet" href="/platform-assets/css/platform.css">
</head>
<body>
<div class="bg"></div>
<header id="app-header" data-title="🔑 Ailogy 密钥"><span id="who" class="who"></span></header>

<main class="wrap">
  <section id="dash" hidden>
    <div class="box">
      <div class="bt">我的密钥 <button id="newkey" class="mini">+ 新建密钥</button></div>
      <p class="hint">密钥明文随时可复制（个人自托管）；删除不可逆。</p>
      <div id="keys"></div>
    </div>
    <div class="box">
      <div class="bt">申请 API 密钥（可选，走管理员审批）</div>
      <div id="app-state" class="msg"></div>
      <form id="apply-form">
        <textarea id="reason" placeholder="申请理由（可选）"></textarea>
        <button type="submit">提交申请</button>
      </form>
    </div>
    <div class="box" id="admin-card" hidden>
      <div class="bt">🛡 待审批申请</div>
      <div id="admin-apps"></div>
    </div>
  </section>
  <!-- 未登录提示 -->
  <section id="need-login" class="box" hidden>
    <p class="hint">管理密钥需要先登录。</p>
    <a class="mini" href="/account">👤 前往账户登录 →</a>
  </section>
</main>

<script src="/static/frontend/shared/js/utils.js"></script>
<script src="/static/frontend/shared/js/ui.js"></script>
<script src="/static/frontend/shared/js/header.js"></script>
<script src="/static/frontend/shared/js/page-nav.js"></script>
<script src="/platform-assets/js/platform.js"></script>
</body>
</html>
