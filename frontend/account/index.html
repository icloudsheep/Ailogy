<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailogy · 账户</title>
<script>
  try {
    document.documentElement.setAttribute("data-style", localStorage.getItem("ailogy:style") || "glass");
    document.documentElement.setAttribute("data-mode", localStorage.getItem("ailogy:mode") || "light");
  } catch (e) {}
</script>
<link rel="stylesheet" href="/static/frontend/shared/css/theme.css">
<link rel="stylesheet" href="/account-assets/css/account.css">
</head>
<body>
<div class="bg"></div>
<header id="app-header" data-title="👤 Ailogy 账户"></header>

<main class="wrap">
  <!-- 未登录：注册/登录 -->
  <section id="auth" class="box" hidden>
    <div class="tabs">
      <button class="tab on" data-pane="login">登录</button>
      <button class="tab" data-pane="register">注册</button>
    </div>
    <div id="msg" class="msg"></div>
    <form id="form">
      <input id="email" type="email" placeholder="邮箱" autocomplete="email" required />
      <input id="password" type="password" placeholder="密码（≥8 位）" autocomplete="current-password" required />
      <input id="handle" type="text" placeholder="用户名 handle（注册可选，用于页面地址 /u/xxx）" hidden />
      <button id="submit" type="submit">登录</button>
    </form>
  </section>

  <!-- 已登录：个人信息（不含密钥） -->
  <section id="profile" class="box" hidden>
    <div class="bt">个人信息</div>
    <div class="info-row"><span class="info-k">邮箱</span><span id="p-email" class="info-v"></span></div>
    <div class="info-row"><span class="info-k">用户名</span><span id="p-handle" class="info-v"></span></div>
    <div class="info-row"><span class="info-k">角色</span><span id="p-role" class="info-v"></span></div>
    <div class="info-row"><span class="info-k">个人页</span><a id="p-page" class="info-v link" href="#"></a></div>
    <div class="acts">
      <a class="mini" href="/platform">🔑 管理密钥</a>
      <button id="logout" class="mini danger">退出登录</button>
    </div>
  </section>
</main>

<script src="/static/frontend/shared/js/utils.js"></script>
<script src="/static/frontend/shared/js/ui.js"></script>
<script src="/static/frontend/shared/js/header.js"></script>
<script src="/static/frontend/shared/js/page-nav.js"></script>
<script src="/account-assets/js/account.js"></script>
</body>
</html>
