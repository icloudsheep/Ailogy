<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailogy · 设置</title>
<script>
  try {
    document.documentElement.setAttribute("data-style", localStorage.getItem("ailogy:style") || "glass");
    document.documentElement.setAttribute("data-mode", localStorage.getItem("ailogy:mode") || "light");
  } catch (e) {}
</script>
<link rel="stylesheet" href="/static/frontend/shared/css/theme.css">
<link rel="stylesheet" href="/settings-assets/settings.css">
</head>
<body>
<div class="bg"></div>
<header id="app-header" data-icon="gear" data-title="设置"></header>
<main class="wrap">
  <section class="box">
    <div class="bt">外观风格</div>
    <div class="opt-row" id="style-row">
      <button class="opt" data-style="glass"><svg class="icon" aria-hidden="true"><use href="#i-glass"></use></svg> 玻璃</button>
      <button class="opt" data-style="neumorphism"><svg class="icon" aria-hidden="true"><use href="#i-cube"></use></svg> 拟态</button>
      <button class="opt" data-style="newspaper"><svg class="icon" aria-hidden="true"><use href="#i-newspaper"></use></svg> 报纸</button>
    </div>
  </section>
  <section class="box">
    <div class="bt">明暗模式</div>
    <div class="opt-row" id="mode-row">
      <button class="opt" data-mode="light"><svg class="icon" aria-hidden="true"><use href="#i-sun"></use></svg> 光明</button>
      <button class="opt" data-mode="dark"><svg class="icon" aria-hidden="true"><use href="#i-moon"></use></svg> 黑暗</button>
    </div>
  </section>
</main>
<script src="/static/frontend/shared/js/utils.js"></script>
<script src="/static/frontend/shared/js/icons.js"></script>
<script src="/static/frontend/shared/js/ui.js"></script>
<script src="/static/frontend/shared/js/header.js"></script>
<script src="/static/frontend/shared/js/page-nav.js"></script>
<script src="/settings-assets/settings.js"></script>
</body>
</html>
